<style>
.inv-page{
  display:flex;
  flex-direction:column;
  gap:1.5rem;
  font-family:'DM Sans', system-ui, sans-serif;
}

.inv-title{
  margin:0;
  font-size:1.9rem;
  font-weight:800;
  color:#1e293b;
  letter-spacing:-.02em;
}

.inv-sub{
  margin:.35rem 0 0 0;
  color:#64748b;
  font-size:.95rem;
}

.inv-head,
.inv-add-head,
.inv-detail-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
}

.inv-head-actions{
  display:flex;
  gap:.75rem;
  flex-wrap:wrap;
}

.inv-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.55rem;
  padding:.9rem 1.15rem;
  border-radius:1rem;
  font-size:.92rem;
  font-weight:700;
  text-decoration:none;
  border:1px solid transparent;
  transition:.18s ease;
  white-space:nowrap;
  cursor:pointer;
}

.inv-btn i{font-size:1rem;}

.inv-btn--primary{
  background:#16a34a;
  color:#fff;
  box-shadow:0 8px 20px rgba(22,163,74,.18);
}
.inv-btn--primary:hover{background:#15803d;color:#fff;}

.inv-btn--secondary{
  background:#fff;
  color:#0f172a;
  border-color:#e2e8f0;
}
.inv-btn--secondary:hover{
  border-color:#93c5fd;
  color:#2563eb;
}

.inv-btn--ghost{
  background:#fff;
  color:#475569;
  border-color:#e2e8f0;
}
.inv-btn--ghost:hover{
  border-color:#cbd5e1;
  color:#0f172a;
}

.inv-btn--danger{
  background:#fff;
  color:#dc2626;
  border-color:#fecaca;
}
.inv-btn--danger:hover{
  background:#fef2f2;
}

.inv-tabs{
  display:flex;
  gap:.25rem;
  border-bottom:1px solid #e2e8f0;
  overflow-x:auto;
}

.inv-tab{
  display:inline-flex;
  align-items:center;
  padding:1rem 1.25rem;
  text-decoration:none;
  font-size:.9rem;
  font-weight:700;
  color:#64748b;
  position:relative;
  transition:color .2s ease;
  white-space:nowrap;
}
.inv-tab::after{
  content:"";
  position:absolute;
  left:.6rem;
  right:.6rem;
  bottom:-1px;
  height:3px;
  border-radius:999px;
  background:#16a34a;
  transform:scaleX(0);
  transform-origin:center;
  opacity:0;
  transition:transform .24s ease, opacity .24s ease;
}
.inv-tab:hover{color:#0f172a;}
.inv-tab--active{
  color:#16a34a;
}
.inv-tab--active::after{
  transform:scaleX(1);
  opacity:1;
}
.inv-tab:focus-visible{
  outline:2px solid #86efac;
  outline-offset:-2px;
}

#inventory-panel{
  margin-top:1rem;
}

.inv-card{
  background:#fff;
  border:1px solid #dbe4ee;
  border-radius:1.25rem;
  box-shadow:0 6px 18px rgba(15,23,42,.06);
  overflow:hidden;
}

.inv-card-head{
  padding:1rem 1.1rem;
  border-bottom:1px solid #e8eef5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
  background:#f8fafc;
}

.inv-card-body{
  padding:1.15rem;
}

.inv-card-title{
  margin:0;
  font-size:1rem;
  font-weight:800;
  color:#1e293b;
}

.inv-search{
  position:relative;
}

.inv-toolbar-form{
  display:flex;
  align-items:center;
  gap:.65rem;
  flex-wrap:wrap;
}

.inv-search i{
  position:absolute;
  left:.8rem;
  top:50%;
  transform:translateY(-50%);
  color:#94a3b8;
  font-size:.85rem;
}

.inv-search input{
  width:280px;
  max-width:100%;
  padding:.7rem .9rem .7rem 2.3rem;
  border:1px solid #cbd5e1;
  border-radius:.8rem;
  background:#fff;
  font-size:.88rem;
  outline:none;
}
.inv-search input:focus{
  border-color:#16a34a;
  box-shadow:0 0 0 3px rgba(22,163,74,.12);
}

.inv-sort{
  display:flex;
  align-items:center;
  gap:.45rem;
}

.inv-sort label{
  margin:0;
  font-size:.78rem;
  font-weight:700;
  color:#64748b;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.inv-sort select{
  min-width:220px;
  border:1px solid #cbd5e1;
  border-radius:.8rem;
  padding:.62rem .75rem;
  font-size:.84rem;
  background:#fff;
  color:#0f172a;
  outline:none;
}

.inv-sort select:focus{
  border-color:#16a34a;
  box-shadow:0 0 0 3px rgba(22,163,74,.12);
}

.inv-table-wrap{
  overflow-x:auto;
  border-top:1px solid #edf2f7;
}

.inv-category-stack{
  display:flex;
  flex-direction:column;
  gap:1rem;
  padding:1rem 1.1rem 1.1rem;
}

.inv-category-block{
  border:1px solid #e2e8f0;
  border-radius:1rem;
  background:#fff;
  overflow:hidden;
}

.inv-category-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.75rem;
  padding:.78rem .95rem;
  border-bottom:1px solid #e8eef5;
  background:linear-gradient(180deg, #fbfdff 0%, #f8fafc 100%);
}

.inv-category-title{
  margin:0;
  font-size:.9rem;
  font-weight:800;
  color:#0f172a;
}

.inv-category-count{
  display:inline-flex;
  align-items:center;
  padding:.22rem .58rem;
  border-radius:999px;
  border:1px solid #dbe4ee;
  background:#fff;
  color:#475569;
  font-size:.72rem;
  font-weight:700;
  white-space:nowrap;
}

.inv-category-table-wrap{
  overflow-x:auto;
}

.inv-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
}
.inv-table--stock{
  table-layout:fixed;
  min-width:980px;
}
.inv-table th{
  text-align:left;
  padding:1rem 1.1rem;
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:#64748b;
  background:#f8fafc;
  border-bottom:1px solid #e5edf5;
  white-space:nowrap;
}
.inv-table td{
  padding:1rem 1.1rem;
  border-bottom:1px solid #edf2f7;
  vertical-align:middle;
}
.inv-table--stock th,
.inv-table--stock td{
  padding:.95rem 1rem;
}
.inv-table tbody tr:hover{background:#f8fafc;}
.inv-table tbody tr:last-child td{border-bottom:none;}
.inv-row--critical{background:rgba(254,242,242,.7);}
.inv-row--excess{background:rgba(240,253,244,.55);}

.inv-product{
  font-weight:800;
  color:#1e293b;
  margin:0;
}
.inv-product-meta{
  margin:.3rem 0 0 0;
  font-size:.82rem;
  color:#64748b;
}

.inv-value{
  font-weight:800;
  color:#1e293b;
  font-size:1rem;
}
.inv-value--critical{color:#dc2626;}
.inv-value--excess{color:#16a34a;}

.inv-unit{
  color:#64748b;
  font-size:.82rem;
  font-weight:500;
}

.inv-subvalue{
  display:block;
  margin-top:.2rem;
  font-size:.78rem;
  color:#64748b;
}

.inv-status{
  display:inline-flex;
  align-items:center;
  gap:.35rem;
  padding:.35rem .7rem;
  border-radius:.6rem;
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.inv-status--critical{background:#fee2e2;color:#dc2626;}
.inv-status--normal{background:#eff6ff;color:#2563eb;}
.inv-status--excess{background:#dcfce7;color:#15803d;}

.inv-actions{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:.45rem;
}

.inv-icon-btn{
  width:40px;
  height:40px;
  border-radius:.85rem;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border:1px solid transparent;
  color:#94a3b8;
  transition:.15s ease;
  background:transparent;
}
.inv-icon-btn:hover{
  color:#2563eb;
  background:#eff6ff;
}
.inv-icon-btn--green:hover{
  color:#16a34a;
  background:#dcfce7;
}
.inv-icon-btn--amber:hover{
  color:#d97706;
  background:#fef3c7;
}
.inv-icon-btn--red:hover{
  color:#dc2626;
  background:#fee2e2;
}

.inv-grid{
  display:grid;
  grid-template-columns:minmax(280px, 360px) minmax(0, 1fr);
  gap:1.5rem;
}

.inv-data-grid{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:1.5rem;
}

.inv-metric{
  padding:1.35rem;
}
.inv-metric-label{
  color:#64748b;
  font-size:.86rem;
  margin:0 0 .35rem 0;
}
.inv-metric-value{
  margin:0;
  font-size:2rem;
  line-height:1;
  font-weight:800;
  color:#1e293b;
}
.inv-metric-sub{
  margin:.5rem 0 0 0;
  font-size:.85rem;
  color:#64748b;
}

.inv-trend{
  display:flex;
  align-items:center;
  gap:.9rem;
}
.inv-trend-icon{
  width:48px;
  height:48px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
}
.inv-trend--up .inv-trend-icon{background:#fee2e2;color:#dc2626;}
.inv-trend--down .inv-trend-icon{background:#dcfce7;color:#16a34a;}
.inv-trend--flat .inv-trend-icon{background:#e2e8f0;color:#475569;}
.inv-trend-value{
  margin:0;
  font-size:1.4rem;
  font-weight:800;
}
.inv-trend--up .inv-trend-value{color:#dc2626;}
.inv-trend--down .inv-trend-value{color:#16a34a;}
.inv-trend--flat .inv-trend-value{color:#475569;}

.inv-chart{
  padding:1.35rem;
  display:flex;
  flex-direction:column;
  gap:1rem;
  min-height:360px;
}
.inv-chart-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
}
.inv-chart-area{
  position:relative;
  flex:1;
  min-height:260px;
  border:1px solid #e2e8f0;
  border-radius:1rem;
  background:#f8fafc;
  overflow:hidden;
  padding:1.25rem 1rem 1rem;
}
.inv-chart-grid{
  position:absolute;
  inset:1.25rem 1rem 1rem;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  pointer-events:none;
}
.inv-chart-grid span{
  border-top:1px dashed #cbd5e1;
}
.inv-chart-grid span:last-child{
  border-top:1px solid #94a3b8;
}
.inv-bars{
  position:absolute;
  inset:1.25rem 1rem 1rem;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:1rem;
}
.inv-bar-wrap{
  flex:1;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  gap:.55rem;
}
.inv-bar{
  width:100%;
  max-width:72px;
  border-radius:.75rem .75rem .3rem .3rem;
  background:#bfdbfe;
  position:relative;
  transition:.18s ease;
}
.inv-bar--active{
  background:#2563eb;
  box-shadow:0 10px 18px rgba(37,99,235,.22);
}
.inv-bar:hover{filter:brightness(.96);}
.inv-bar-tooltip{
  position:absolute;
  top:-2rem;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  font-size:.72rem;
  font-weight:700;
  padding:.22rem .5rem;
  border-radius:.45rem;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
}
.inv-bar:hover .inv-bar-tooltip{opacity:1;}
.inv-bar-label{
  font-size:.76rem;
  color:#64748b;
  font-weight:700;
}

.inv-list-card{padding:1.1rem;}
.inv-list-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  margin-bottom:.85rem;
}
.inv-list-title{
  margin:0;
  font-size:1rem;
  font-weight:800;
  color:#1e293b;
}
.inv-list{
  display:flex;
  flex-direction:column;
  gap:.75rem;
}
.inv-list-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.8rem;
  padding:.9rem 1rem;
  border:1px solid #e2e8f0;
  border-radius:1rem;
}
.inv-list-item-main{
  min-width:0;
}
.inv-list-item-title{
  margin:0;
  font-size:.9rem;
  font-weight:700;
  color:#0f172a;
}
.inv-list-item-meta{
  margin:.25rem 0 0 0;
  font-size:.8rem;
  color:#64748b;
}
.inv-list-item-val{
  font-size:.9rem;
  font-weight:800;
  color:#0f172a;
  white-space:nowrap;
}

.inv-empty{
  padding:2.5rem 1rem;
  text-align:center;
  color:#64748b;
}
.inv-empty i{
  font-size:1.7rem;
  margin-bottom:.5rem;
  display:block;
}

.inv-alert{
  padding:.95rem 1rem;
  border-radius:1rem;
  font-size:.92rem;
  border:1px solid transparent;
}
.inv-alert--danger{
  background:#fef2f2;
  border-color:#fecaca;
  color:#b91c1c;
}
.inv-alert--warning{
  background:#fffbeb;
  border-color:#fde68a;
  color:#92400e;
}
.inv-alert--success{
  background:#ecfdf3;
  border-color:#bbf7d0;
  color:#166534;
}
.inv-alert strong{font-weight:800;}

.inv-stat-grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:1rem;
}

.inv-stat-card{
  padding:1.1rem;
  border-radius:1.1rem;
  border:1px solid #e2e8f0;
  background:#fff;
}
.inv-stat-value{
  margin:0;
  font-size:1.55rem;
  font-weight:800;
  color:#0f172a;
}
.inv-stat-label{
  margin:.35rem 0 0 0;
  color:#64748b;
  font-size:.84rem;
}

.inv-section-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:1.25rem;
}

.inv-form{
  display:flex;
  flex-direction:column;
  gap:1rem;
}
.inv-form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:1rem;
}
.inv-field{
  display:flex;
  flex-direction:column;
  gap:.45rem;
}
.inv-field label{
  font-size:.86rem;
  font-weight:700;
  color:#334155;
}
.inv-field input,
.inv-field select,
.inv-field textarea{
  width:100%;
  padding:.85rem .95rem;
  border:1px solid #cbd5e1;
  border-radius:.9rem;
  background:#fff;
  font-size:.92rem;
  outline:none;
}
.inv-field textarea{
  min-height:120px;
  resize:vertical;
}
.inv-field input:focus,
.inv-field select:focus,
.inv-field textarea:focus{
  border-color:#16a34a;
  box-shadow:0 0 0 3px rgba(22,163,74,.12);
}
.inv-help{
  font-size:.8rem;
  color:#64748b;
}
.inv-errors{
  font-size:.8rem;
  color:#dc2626;
}

.inv-actions-row{
  display:flex;
  gap:.75rem;
  flex-wrap:wrap;
  padding-top:.25rem;
}

#inventory-panel.htmx-request{
  opacity:.62;
  transition:opacity .18s ease;
}

@media (max-width: 1100px){
  .inv-grid,
  .inv-data-grid,
  .inv-section-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width: 900px){
  .inv-stat-grid,
  .inv-form-grid{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width: 768px){
  .inv-title{font-size:1.55rem;}
  .inv-head-actions{width:100%;}
  .inv-btn{flex:1;}
  .inv-search input{width:100%;}
  .inv-toolbar-form{width:100%;}
  .inv-search{flex:1 1 100%;}
  .inv-sort{width:100%;justify-content:flex-start;}
  .inv-sort select{width:100%;min-width:0;}
  .inv-category-stack{padding:.9rem;}
  .inv-category-head{padding:.7rem .8rem;flex-wrap:wrap;}
  .inv-stat-grid,
  .inv-form-grid{
    grid-template-columns:1fr;
  }
  #inventory-panel{
    margin-top:.85rem;
  }
}
</style>
