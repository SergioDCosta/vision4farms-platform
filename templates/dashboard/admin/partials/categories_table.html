<div id="categories-table">
  <div style="overflow-x:auto">
    <table class="adm-table">
      <thead>
        <tr>
          <th>Categoria</th>
          <th>Slug</th>
          <th>Criado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for cat in categories %}
        <tr>
          <td style="font-weight:600;color:#0f172a;">{{ cat.name }}</td>
          <td style="font-size:.8rem;color:#94a3b8;font-family:'DM Mono',monospace;">{{ cat.slug }}</td>
          <td style="font-size:.8rem;color:#64748b;font-family:'DM Mono',monospace;">{{ cat.created_at|date:"d/m/Y" }}</td>
          <td>
            <div style="display:flex;justify-content:flex-end;gap:.35rem;">
              <a href="{% url 'dashboard:gestor_categoria_editar' cat.id %}" class="adm-act-btn" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="4">
            <div class="adm-empty">
              <i class="bi bi-tags"></i>
              <p>Sem categorias registadas.</p>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
