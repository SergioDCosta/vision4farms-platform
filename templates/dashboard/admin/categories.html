{% extends "dashboard/admin/base_admin.html" %}
{% block admin_content %}
<div class="adm-card">
  <div class="adm-card-head">
    <form
      method="get"
      class="adm-search"
      hx-get="{% url 'dashboard:gestor_categorias' %}"
      hx-trigger="keyup changed delay:300ms from:input[name='q']"
      hx-target="#categories-table"
      hx-swap="outerHTML"
      hx-push-url="true"
    >
      <i class="bi bi-search"></i>
      <input type="text" name="q" value="{{ q }}" placeholder="Pesquisar categorias..." autocomplete="off">
    </form>

    <button class="adm-btn-primary"><i class="bi bi-plus-lg"></i> Nova categoria</button>
  </div>

  {% include "dashboard/admin/partials/categories_table.html" %}
</div>
{% endblock %}
