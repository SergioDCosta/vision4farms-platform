{% extends "dashboard/admin/base_admin.html" %}
{% block admin_content %}

<div style="display:flex;flex-direction:column;gap:1rem;">
  <div class="adm-card" style="padding:1rem 1rem 0 1rem;">
    <div class="adm-card-head" style="padding:0 0 1rem 0;">
      <form
        method="get"
        class="adm-search"
        hx-get="{% url 'dashboard:gestor_produtos' %}"
        hx-trigger="keyup changed delay:300ms from:input[name='q']"
        hx-target="#products-table"
        hx-swap="outerHTML"
        hx-push-url="true"
      >
        <i class="bi bi-search"></i>
        <input type="text" name="q" value="{{ q }}" placeholder="Pesquisar produtos..." autocomplete="off">
      </form>

      <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:.5rem;padding:.55rem .95rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:.85rem;font-size:.8rem;color:#64748b;">
          <i class="bi bi-info-circle" style="color:#2563eb;"></i>
          Os produtos são geridos pelo administrador
        </div>

        <a href="{% url 'dashboard:gestor_produto_novo' %}" class="adm-btn-primary">
          <i class="bi bi-plus-lg"></i> Novo produto
        </a>
      </div>
    </div>

    {% include "dashboard/admin/partials/products_table.html" %}
  </div>
</div>

{% endblock %}
