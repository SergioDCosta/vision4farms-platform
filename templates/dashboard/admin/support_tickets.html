{% extends "dashboard/admin/base_admin.html" %}
{% block admin_content %}
<div class="adm-card">
  <div class="adm-card-head" style="gap:.65rem;">
    <form
      method="get"
      class="adm-search"
      style="max-width:360px;"
      hx-get="{% url 'support:admin_ticket_list' %}"
      hx-trigger="keyup changed delay:300ms from:input[name='q']"
      hx-target="#support-tickets-table"
      hx-swap="outerHTML"
      hx-push-url="true"
    >
      <i class="bi bi-search"></i>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Pesquisar por ticket, assunto, nome ou email..."
        autocomplete="off"
      >
      {% if selected_status %}
        <input type="hidden" name="status" value="{{ selected_status }}">
      {% endif %}
    </form>

    <form
      method="get"
      style="display:flex;align-items:center;gap:.5rem;margin-left:auto;"
      hx-get="{% url 'support:admin_ticket_list' %}"
      hx-trigger="change from:select[name='status'], click from:button[type='submit']"
      hx-target="#support-tickets-table"
      hx-swap="outerHTML"
      hx-push-url="true"
    >
      {% if q %}
        <input type="hidden" name="q" value="{{ q }}">
      {% endif %}
      <select name="status" class="form-select" style="min-width:170px;">
        <option value="">Todos os estados</option>
        {% for value, label in status_choices %}
          <option value="{{ value }}" {% if value == selected_status %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      <button type="submit" class="adm-btn-ghost">
        <i class="bi bi-funnel"></i> Filtrar
      </button>
    </form>
  </div>

  {% include "dashboard/admin/partials/support_tickets_table.html" %}
</div>
{% endblock %}
