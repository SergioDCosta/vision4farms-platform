{% extends "dashboard/admin/base_admin.html" %}
{% block admin_content %}
<div class="adm-card">
  <div class="adm-card-head">
    <form
      method="get"
      class="adm-search"
      hx-get="{% url 'dashboard:gestor_utilizadores' %}"
      hx-trigger="keyup changed delay:300ms from:input[name='q']"
      hx-target="#users-table"
      hx-swap="outerHTML"
      hx-push-url="true"
    >
      <i class="bi bi-search"></i>
      <input
        type="text"
        name="q"
        value="{{ q }}"
        placeholder="Pesquisar por nome, email ou role..."
        autocomplete="off"
      >
    </form>

    <a href="{% url 'dashboard:gestor_utilizador_novo' %}" class="adm-btn-primary">
      <i class="bi bi-person-plus-fill"></i> Novo utilizador
    </a>
  </div>

  {% include "dashboard/admin/partials/users_table.html" %}
</div>
{% endblock %}
