{% extends "dashboard/admin/base_admin.html" %}
{% block admin_content %}
<div class="adm-card">
  <div class="adm-card-head">
    <form
      method="get"
      class="adm-search"
      hx-get="{% url 'dashboard:gestor_auditoria' %}"
      hx-trigger="keyup changed delay:300ms from:input[name='q']"
      hx-target="#audit-table"
      hx-swap="outerHTML"
      hx-push-url="true"
    >
      <i class="bi bi-search"></i>
      <input type="text" name="q" value="{{ q }}" placeholder="Pesquisar registos de auditoria..." autocomplete="off">
    </form>

    <div style="display:flex;gap:.5rem;">
      <button class="adm-btn-ghost" type="button"><i class="bi bi-funnel"></i> Filtrar</button>
      <button class="adm-btn-ghost" type="button"><i class="bi bi-download"></i> Exportar</button>
    </div>
  </div>

  {% include "dashboard/admin/partials/audit_table.html" %}
</div>
{% endblock %}
