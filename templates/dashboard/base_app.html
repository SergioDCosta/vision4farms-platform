{% extends "base.html" %}

{% block title %}{% block app_title %}App{% endblock %}{% endblock %}

{% block content %}
<div class="app-shell">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    {% include "partials/sidebar.html" %}

    <div class="app-main">
        {% include "partials/topbar.html" %}

        <main class="app-content">
            <div class="app-content-inner">
                {% block app_content %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<style>
    .app-shell {
        min-height: 100vh;
        display: flex;
        background: #f8fafc;
        overflow: hidden;
    }

    .app-sidebar {
        width: 256px;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 50;
        transform: translateX(0);
        transition: transform 0.28s ease;
    }

    .sidebar-brand {
        padding: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #f1f5f9;
    }

    .sidebar-brand-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: #16a34a;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
    }

    .sidebar-brand-text {
        font-weight: 800;
        font-size: 20px;
        color: #1e293b;
        line-height: 1;
    }

    .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 12px;
        border-radius: 12px;
        color: #475569;
        text-decoration: none;
        font-size: 15px;
        transition: background 0.2s ease, color 0.2s ease;
    }

    .sidebar-link:hover {
        background: #f8fafc;
        color: #0f172a;
    }

    .sidebar-link.active {
        background: #dcfce7;
        color: #166534;
        font-weight: 700;
    }

    .sidebar-link-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        font-size: 17px;
        line-height: 1;
    }

    .sidebar-footer {
        padding: 16px;
        border-top: 1px solid #f1f5f9;
    }

    .logout-link {
        color: #64748b;
    }

    .logout-link:hover {
        color: #dc2626;
        background: #f8fafc;
    }

    .app-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin-left: 256px;
        min-height: 100vh;
        overflow: hidden;
    }

    .app-topbar {
        height: 64px;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 30;
    }

    .topbar-left,
    .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .mobile-menu-btn {
        display: none;
        border: none;
        background: transparent;
        color: #64748b;
        padding: 8px;
        border-radius: 10px;
        cursor: pointer;
    }

    .mobile-menu-btn:hover {
        background: #f1f5f9;
    }

    .topbar-page-context {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .topbar-context-label {
        font-size: 12px;
        color: #94a3b8;
        line-height: 1;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .topbar-context-title {
        font-size: 15px;
        color: #1e293b;
        line-height: 1.2;
        font-weight: 700;
    }

    .topbar-shortcut-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #334155;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 9px 12px;
        border-radius: 12px;
        transition: background 0.2s ease, color 0.2s ease;
        font-size: 14px;
        font-weight: 600;
    }

    .topbar-shortcut-btn:hover {
        background: #f1f5f9;
        color: #0f172a;
    }

    .topbar-icon-btn {
        position: relative;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        color: #64748b;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: background 0.2s ease, color 0.2s ease;
    }

    .topbar-icon-btn:hover {
        background: #f1f5f9;
        color: #0f172a;
    }

    .topbar-notification-dot {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 9px;
        height: 9px;
        background: #ef4444;
        border-radius: 999px;
        border: 2px solid #ffffff;
    }

    .topbar-divider {
        width: 1px;
        height: 28px;
        background: #e2e8f0;
    }

    .topbar-profile-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        padding: 6px 8px;
        border-radius: 12px;
        transition: background 0.2s ease;
    }

    .topbar-profile-btn:hover {
        background: #f8fafc;
    }

    .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        background: #dbeafe;
        color: #2563eb;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 12px;
        flex-shrink: 0;
    }

    .topbar-profile-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
    }

    .topbar-profile-name {
        font-size: 14px;
        font-weight: 700;
        color: #334155;
        line-height: 1;
    }

    .topbar-profile-role {
        font-size: 12px;
        color: #64748b;
        line-height: 1;
    }

    .app-content {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
    }

    .app-content-inner {
        max-width: 1280px;
        margin: 0 auto;
    }

    .sidebar-overlay {
        display: none;
    }

    .desktop-only {
        display: flex;
    }

    @media (max-width: 900px) {
        .mobile-menu-btn {
            display: inline-flex;
        }

        .desktop-only,
        .topbar-page-context {
            display: none;
        }

        .app-sidebar {
            transform: translateX(-100%);
        }

        .app-sidebar.is-open {
            transform: translateX(0);
        }

        .sidebar-overlay.is-open {
            display: block;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 40;
        }

        .app-main {
            margin-left: 0;
        }

        .app-topbar {
            padding: 0 16px;
        }

        .app-content {
            padding: 18px;
        }
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const sidebar = document.getElementById("appSidebar");
    const overlay = document.getElementById("sidebarOverlay");
    const toggleBtn = document.getElementById("sidebarToggleBtn");

    function openSidebar() {
        if (window.innerWidth > 900) return;
        sidebar?.classList.add("is-open");
        overlay?.classList.add("is-open");
    }

    function closeSidebar() {
        sidebar?.classList.remove("is-open");
        overlay?.classList.remove("is-open");
    }

    toggleBtn?.addEventListener("click", function () {
        if (sidebar?.classList.contains("is-open")) {
            closeSidebar();
        } else {
            openSidebar();
        }
    });

    overlay?.addEventListener("click", closeSidebar);

    window.addEventListener("resize", function () {
        if (window.innerWidth > 900) {
            closeSidebar();
        }
    });
});
</script>
{% endblock %}
