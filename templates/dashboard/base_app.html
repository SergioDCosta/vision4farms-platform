{% extends "base.html" %}

{% block title %}{% block app_title %}App{% endblock %}{% endblock %}

{% block extra_css %}
{{ block.super }}
<meta name="referrer" content="strict-origin-when-cross-origin">
{% endblock %}

{% block content %}
<div class="shell" id="appShell">

  <div class="shell-overlay" id="shellOverlay"></div>

  {% include "partials/sidebar.html" %}

  <div class="shell-main" id="shellMain">
    {% include "partials/topbar.html" %}

    <main class="shell-content">
      <div class="shell-content-inner">
        {% block app_content %}{% endblock %}
      </div>
    </main>
  </div>
</div>

<style>
/* ═══════════════════════════════════════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════════════════════════════════════ */
:root {
  --sidebar-w:          240px;
  --sidebar-w-collapsed: 64px;
  --sidebar-pill-size:  40px;
  --topbar-h:           60px;

  --green:        #16a34a;
  --green-dark:   #15803d;
  --green-soft:   #dcfce7;
  --green-muted:  rgba(220,252,231,.15);

  --sidebar-bg:   #0f1f13;
  --sidebar-text: rgba(255,255,255,.72);
  --sidebar-hover:#ffffff;
  --sidebar-active-bg: rgba(22,163,74,.18);
  --sidebar-active-text: #4ade80;

  --topbar-bg:    #ffffff;
  --topbar-border:#e9eef3;

  --body-bg:      #f1f5f3;
  --text:         #0f172a;
  --muted:        #64748b;
  --border:       #e2e8f0;
  --card-bg:      #ffffff;

  --radius:       .75rem;
  --shadow-sm:    0 1px 3px rgba(15,23,42,.06), 0 2px 8px rgba(15,23,42,.04);
  --shadow:       0 4px 16px rgba(15,23,42,.08);

  --transition:   .22s cubic-bezier(.4,0,.2,1);
}

/* ═══════════════════════════════════════════════════════════════════════════
   RESET / BASE
═══════════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: var(--body-bg); font-family: 'DM Sans', system-ui, -apple-system, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

/* ═══════════════════════════════════════════════════════════════════════════
   SHELL LAYOUT
═══════════════════════════════════════════════════════════════════════════ */
.shell {
  display: flex;
  min-height: 100vh;
}

/* overlay (mobile) */
.shell-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,23,42,.5);
  z-index: 140;
  backdrop-filter: blur(2px);
}
.shell-overlay.is-open { display: block; }

/* main area */
.shell-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  margin-left: var(--sidebar-w);
  transition: margin-left var(--transition);
}
.shell.sidebar-collapsed .shell-main {
  margin-left: var(--sidebar-w-collapsed);
}

/* content */
.shell-content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}
.shell-content-inner {
  max-width: 1920px;
  margin: 0 auto;
  width: 100%;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════════════════ */
.app-sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  min-height: 100vh;
  height: 100%;
  position: fixed;
  top: 0; left: 0;
  z-index: 150;
  display: flex;
  flex-direction: column;
  transition: width var(--transition);
  overflow: hidden;
}

/* brand */
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: 0 1rem;
  height: var(--topbar-h);
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
  overflow: hidden;
  text-decoration: none;
  color: #fff;
}
.sidebar-brand:hover,
.sidebar-brand:focus,
.sidebar-brand:visited {
  color: #fff;
  text-decoration: none;
}
.sidebar-brand-icon {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: var(--green);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.sidebar-brand-text {
  font-size: 1rem; font-weight: 800;
  color: #fff; letter-spacing: -.01em;
  white-space: nowrap;
  flex: 1;
  transition: opacity var(--transition), width var(--transition);
}
.sidebar-collapse-btn {
  margin-left: auto;
  background: none; border: none;
  color: rgba(255,255,255,.4);
  cursor: pointer; padding: .35rem;
  border-radius: .4rem;
  font-size: 1rem; line-height: 1;
  flex-shrink: 0;
  transition: color .15s, background .15s;
  display: flex; align-items: center;
}
.sidebar-collapse-btn:hover { color: #fff; background: rgba(255,255,255,.08); }

/* nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: .75rem .625rem;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.1) transparent;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 99px; }

.sidebar-link {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem .75rem;
  border-radius: .6rem;
  color: var(--sidebar-text);
  text-decoration: none;
  font-size: .875rem; font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  transition: background .15s, color .15s;
  position: relative;
}
.sidebar-link:hover { background: rgba(255,255,255,.07); color: var(--sidebar-hover); }
.sidebar-link.active {
  background: var(--sidebar-active-bg);
  color: var(--sidebar-active-text);
  font-weight: 600;
}
.sidebar-link-icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.sidebar-link-text {
  transition: opacity var(--transition);
  white-space: nowrap;
}

/* footer */
.sidebar-footer {
  padding: .625rem;
  border-top: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.sidebar-logout:hover { color: #fca5a5 !important; background: rgba(220,38,38,.12) !important; }

/* ── COLLAPSED STATE ────────────────────────────────────────────────────── */
.shell.sidebar-collapsed .app-sidebar { width: var(--sidebar-w-collapsed); }
.shell.sidebar-collapsed .sidebar-brand-text { opacity: 0; width: 0; }
.shell.sidebar-collapsed .sidebar-collapse-btn { margin-left: 0; }
.shell.sidebar-collapsed .sidebar-link-text { opacity: 0; width: 0; }

/* tooltip for collapsed icons */
.shell.sidebar-collapsed .sidebar-link {
  width: var(--sidebar-pill-size);
  height: var(--sidebar-pill-size);
  margin-inline: auto;
  justify-content: center;
  align-items: center;
  gap: 0;
  padding: 0;
}
.shell.sidebar-collapsed .sidebar-link::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(var(--sidebar-w-collapsed) + .5rem);
  background: #1e293b;
  color: #fff;
  padding: .35rem .7rem;
  border-radius: .4rem;
  font-size: .78rem; font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-4px);
  transition: opacity .15s, transform .15s;
  z-index: 200;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.shell.sidebar-collapsed .sidebar-link:hover::after {
  opacity: 1; transform: translateX(0);
}

/* ═══════════════════════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════════════════════ */
.app-topbar {
  height: var(--topbar-h);
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--topbar-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
  flex-shrink: 0;
  gap: 1rem;
}

/* left */
.topbar-left { display: flex; align-items: center; gap: .75rem; min-width: 0; }

.topbar-menu-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  width: 36px; height: 36px;
  border-radius: .5rem;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem;
  flex-shrink: 0;
  transition: background .15s, color .15s;
}
.topbar-menu-btn:hover { background: var(--body-bg); color: var(--text); }

.topbar-breadcrumb {
  display: flex; align-items: center; gap: .4rem;
  font-size: .82rem; color: var(--muted);
  min-width: 0;
}
.topbar-breadcrumb-root { white-space: nowrap; }
.topbar-breadcrumb-sep  { font-size: .65rem; opacity: .5; }
.topbar-breadcrumb-page { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* right */
.topbar-right { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }

.topbar-action-btn {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: .45rem .9rem; border-radius: .55rem;
  background: var(--green-soft); color: var(--green-dark);
  font-size: .8rem; font-weight: 600;
  text-decoration: none;
  transition: background .15s;
}
.topbar-action-btn:hover { background: #bbf7d0; }

.topbar-icon-btn {
  position: relative;
  width: 36px; height: 36px;
  border-radius: .5rem;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; font-size: 1.1rem;
  transition: background .15s, color .15s;
}
.topbar-icon-btn:hover { background: var(--body-bg); color: var(--text); }
.topbar-notif-dot {
  position: absolute; top: 7px; right: 7px;
  width: 8px; height: 8px;
  background: #ef4444; border-radius: 50%;
  border: 2px solid #fff;
}

.topbar-divider {
  width: 1px; height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.topbar-profile {
  display: flex; align-items: center; gap: .65rem;
  padding: .35rem .6rem; border-radius: .6rem;
  text-decoration: none;
  transition: background .15s;
}
.topbar-profile:hover { background: var(--body-bg); }

.topbar-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--green-soft); color: var(--green-dark);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .75rem;
  flex-shrink: 0;
  overflow: hidden;
}

.topbar-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.topbar-profile-info { display: flex; flex-direction: column; gap: 1px; }
.topbar-profile-name { font-size: .82rem; font-weight: 700; color: var(--text); white-space: nowrap; line-height: 1; }
.topbar-profile-role { font-size: .73rem; color: var(--muted); line-height: 1; }
.topbar-profile-caret { font-size: .7rem; color: var(--muted); }

/* ═══════════════════════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════════════════════ */

/* 4K / wide — increase max content width, larger padding */
@media (min-width: 2560px) {
  .shell-content { padding: 2rem 2.5rem; }
  .shell-content-inner { max-width: 2400px; }
}

/* large desktop (1440+) — comfortable */
@media (max-width: 1440px) {
  :root { --sidebar-w: 220px; }
}

/* medium desktop (1024–1280) — auto-collapse sidebar */
@media (max-width: 1280px) {
  .shell:not(.sidebar-mobile-open) .app-sidebar { width: var(--sidebar-w-collapsed); }
  .shell:not(.sidebar-mobile-open) .shell-main  { margin-left: var(--sidebar-w-collapsed); }
  .shell:not(.sidebar-mobile-open) .sidebar-brand-text { opacity: 0; width: 0; }
  .shell:not(.sidebar-mobile-open) .sidebar-link-text  { opacity: 0; width: 0; }
  .shell:not(.sidebar-mobile-open) .sidebar-link{
    width: var(--sidebar-pill-size);
    height: var(--sidebar-pill-size);
    margin-inline: auto;
    justify-content: center;
    align-items: center;
    gap: 0;
    padding: 0;
  }
  .shell:not(.sidebar-mobile-open) .sidebar-collapse-btn { display: none; }
  /* re-show on hover */
  .shell:not(.sidebar-mobile-open) .app-sidebar:hover {
    width: var(--sidebar-w);
  }
  .shell:not(.sidebar-mobile-open) .app-sidebar:hover ~ .shell-main { margin-left: var(--sidebar-w); }
  .shell:not(.sidebar-mobile-open) .app-sidebar:hover .sidebar-brand-text { opacity: 1; width: auto; }
  .shell:not(.sidebar-mobile-open) .app-sidebar:hover .sidebar-link-text  { opacity: 1; width: auto; }
  .shell:not(.sidebar-mobile-open) .app-sidebar:hover .sidebar-link{
    width: auto;
    height: auto;
    margin-inline: 0;
    justify-content: flex-start;
    gap: .75rem;
    padding: .65rem .75rem;
  }
}

/* tablet (768–1024) */
@media (max-width: 1024px) {
  .topbar-hide-mobile { display: none !important; }
  .shell-content { padding: 1.25rem; }
}

/* mobile (< 768) — sidebar as drawer */
@media (max-width: 767px) {
  .app-sidebar {
    transform: translateX(-100%);
    width: var(--sidebar-w) !important;
    box-shadow: none;
  }
  .shell.sidebar-mobile-open .app-sidebar {
    transform: translateX(0);
    box-shadow: 4px 0 32px rgba(15,23,42,.25);
  }
  .shell.sidebar-mobile-open .shell-overlay { display: block; }
  /* all links show text on mobile drawer */
  .shell.sidebar-mobile-open .sidebar-brand-text { opacity: 1 !important; width: auto !important; }
  .shell.sidebar-mobile-open .sidebar-link-text  { opacity: 1 !important; width: auto !important; }
  .shell.sidebar-mobile-open .sidebar-link       { justify-content: flex-start !important; padding: .65rem .75rem !important; }
  .shell-main { margin-left: 0 !important; }
  .shell-content { padding: 1rem; }
  .topbar-action-btn { display: none !important; }
}

/* small mobile */
@media (max-width: 480px) {
  .shell-content { padding: .75rem; }
  .app-topbar { padding: 0 1rem; }
}
</style>

<script>
(function () {
  const shell = document.getElementById('appShell');
  if (!shell) return;

  const overlay = document.getElementById('shellOverlay');
  const COLLAPSED_KEY = 'sidebar_collapsed';

  const isMobile = () => window.innerWidth < 768;
  const isAutoCollapse = () => window.innerWidth < 1280 && window.innerWidth >= 768;
  const normalizePath = (rawPath) => {
    if (!rawPath) return "/";
    let path = rawPath;
    try {
      path = new URL(rawPath, window.location.origin).pathname;
    } catch (error) {
      path = rawPath;
    }
    if (!path.startsWith("/")) {
      path = `/${path}`;
    }
    return path.endsWith("/") ? path : `${path}/`;
  };

  const pathMatches = (currentPath, activeValue, mode) => {
    const expectedPath = normalizePath(activeValue || "/");
    if (mode === "exact") {
      return currentPath === expectedPath;
    }
    return currentPath.startsWith(expectedPath);
  };

  const syncSidebarActive = () => {
    const links = document.querySelectorAll(".sidebar-link[data-active-mode][data-active-value]");
    if (!links.length) return;

    const currentPath = normalizePath(window.location.pathname);
    let matched = false;

    links.forEach((link) => {
      link.classList.remove("active");
    });

    links.forEach((link) => {
      const mode = (link.dataset.activeMode || "prefix").toLowerCase();
      const activeValue = link.dataset.activeValue || link.getAttribute("href") || "/";
      if (pathMatches(currentPath, activeValue, mode)) {
        link.classList.add("active");
        matched = true;
      }
    });

    if (matched) return;

    links.forEach((link) => {
      const hrefPath = normalizePath(link.getAttribute("href") || "");
      if (hrefPath === currentPath) {
        link.classList.add("active");
      }
    });
  };

  const closeMobileSidebar = () => {
    shell.classList.remove("sidebar-mobile-open");
  };

  const toggleMainSidebar = () => {
    if (isMobile()) {
      shell.classList.toggle("sidebar-mobile-open");
      return;
    }

    if (!isAutoCollapse()) {
      shell.classList.toggle("sidebar-collapsed");
      localStorage.setItem(
        COLLAPSED_KEY,
        shell.classList.contains("sidebar-collapsed") ? "1" : "0"
      );
    }
  };

  const toggleDesktopCollapsed = () => {
    if (isMobile() || isAutoCollapse()) return;
    shell.classList.toggle("sidebar-collapsed");
    localStorage.setItem(
      COLLAPSED_KEY,
      shell.classList.contains("sidebar-collapsed") ? "1" : "0"
    );
  };

  // restore desktop collapsed state
  if (!isMobile() && !isAutoCollapse() && localStorage.getItem(COLLAPSED_KEY) === '1') {
    shell.classList.add('sidebar-collapsed');
  }

  syncSidebarActive();

  if (!window.__appShellHandlersBound) {
    document.addEventListener("click", (event) => {
      const toggleBtn = event.target.closest("#sidebarToggleBtn");
      if (toggleBtn) {
        event.preventDefault();
        toggleMainSidebar();
        return;
      }

      const collapseBtn = event.target.closest("#sidebarCollapseBtn");
      if (collapseBtn) {
        event.preventDefault();
        toggleDesktopCollapsed();
        return;
      }

      const sidebarHtmxLink = event.target.closest('.sidebar-link[hx-target="#shellMain"]');
      if (sidebarHtmxLink && isMobile()) {
        closeMobileSidebar();
      }
    });

    // close on overlay click
    overlay?.addEventListener("click", closeMobileSidebar);

    document.body.addEventListener("htmx:afterSwap", (event) => {
      const target = event.detail && event.detail.target;
      if (target && target.id === "shellMain") {
        syncSidebarActive();
      }
    });

    document.body.addEventListener("htmx:historyRestore", syncSidebarActive);
    window.addEventListener("popstate", syncSidebarActive);

    // handle resize
    let lastWidth = window.innerWidth;
    window.addEventListener("resize", () => {
      const width = window.innerWidth;
      if (width === lastWidth) return;

      lastWidth = width;
      if (isMobile()) {
        shell.classList.remove("sidebar-collapsed");
      } else {
        closeMobileSidebar();
      }
    });

    window.__appShellHandlersBound = true;
  }
})();
</script>
{% endblock %}
