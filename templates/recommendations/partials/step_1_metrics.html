<div
  id="step-1-metrics"
  class="rec-step1-metrics"
  aria-live="polite"
  data-deficit-quantity="{{ initial_deficit_quantity|default:'0' }}"
  data-requested-quantity="{{ initial_requested_quantity|default:initial_deficit_quantity|default:'0' }}"
>
  <article class="rec-step1-kpi rec-step1-kpi--current">
    <p class="rec-step1-kpi__label">
      <i class="bi bi-box-seam"></i>
      <span>Quantidade atual</span>
    </p>
    <p class="rec-step1-kpi__value">{{ initial_current_quantity|default:"0"|floatformat:"-3" }}</p>
    <p class="rec-step1-kpi__hint">Stock disponível neste momento para o produto selecionado.</p>
  </article>

  <article class="rec-step1-kpi rec-step1-kpi--deficit">
    <p class="rec-step1-kpi__label">
      <i class="bi bi-exclamation-octagon"></i>
      <span>Défice atual</span>
    </p>
    <p class="rec-step1-kpi__value">{{ initial_deficit_quantity|default:"0"|floatformat:"-3" }}</p>
    <p class="rec-step1-kpi__hint">Défice é o valor de stock necessário para atender a demanda (requisitos mínimos).</p>
  </article>
</div>
