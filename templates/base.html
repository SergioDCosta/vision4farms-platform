<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cooperativa{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #cbd5e1;
            --green: #16a34a;
            --green-dark: #15803d;
            --green-soft: #dcfce7;
            --danger: #dc2626;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius-xl: 20px;
            --radius-lg: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page-center {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 760px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 18px;
            background: var(--green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        .auth-title {
            margin: 0 0 8px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            border: 1px solid #edf2f7;
            padding: 32px;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            font-size: 15px;
            background: #f8fafc;
            outline: none;
            transition: 0.2s ease;
        }

        .form-input.with-left-icon {
            padding-left: 46px;
        }

        .form-input.with-right-button {
            padding-right: 72px;
        }

        .form-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
            background: white;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .password-toggle-btn:hover {
            color: #334155;
        }

        .errorlist {
            list-style: none;
            margin: 8px 0 0;
            padding: 0;
            color: var(--danger);
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            border: none;
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: var(--green);
            color: white;
        }

        .btn-primary:hover {
            background: var(--green-dark);
        }

        .btn-secondary {
            background: white;
            border: 2px solid #e2e8f0;
            color: #334155;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .divider {
            margin: 28px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .text-center { text-align: center; }

        .checkbox-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .checkbox-label {
            display:flex;
            align-items:center;
            gap:8px;
            font-size:14px;
            color:#334155;
        }

        .muted-link {
            color: var(--green);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .muted-link:hover {
            color: var(--green-dark);
        }

        .success-icon-circle {
            width: 80px;
            height: 80px;
            background: var(--green-soft);
            color: var(--green);
            border-radius: 999px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-toast-stack{
            position:fixed;
            top:1rem;
            right:1rem;
            z-index:2000;
            display:flex;
            flex-direction:column;
            gap:.75rem;
            width:min(380px, calc(100vw - 2rem));
            pointer-events:none;
        }

        .app-toast{
            pointer-events:auto;
            display:flex;
            align-items:flex-start;
            gap:.75rem;
            padding:.95rem 1rem;
            border-radius:1rem;
            border:1px solid transparent;
            background:#fff;
            box-shadow:0 16px 40px rgba(15, 23, 42, .12);
            color:#0f172a;
            animation:toast-in .18s ease;
        }

        .app-toast__icon{
            flex-shrink:0;
            width:1.25rem;
            text-align:center;
            margin-top:.1rem;
        }

        .app-toast__content{
            flex:1;
            min-width:0;
        }

        .app-toast__title{
            font-size:.88rem;
            font-weight:700;
            line-height:1.2;
            margin:0 0 .15rem 0;
        }

        .app-toast__message{
            font-size:.82rem;
            line-height:1.4;
            margin:0;
        }

        .app-toast__close{
            border:0;
            background:transparent;
            color:inherit;
            cursor:pointer;
            opacity:.6;
            padding:0;
            line-height:1;
            font-size:1rem;
        }

        .app-toast--success{
            background:#ecfdf3;
            border-color:#bbf7d0;
            color:#166534;
        }

        .app-toast--error{
            background:#fef2f2;
            border-color:#fecaca;
            color:#b91c1c;
        }

        .app-toast--warning{
            background:#fffbeb;
            border-color:#fde68a;
            color:#92400e;
        }

        .app-toast--info{
            background:#eff6ff;
            border-color:#bfdbfe;
            color:#1d4ed8;
        }

        .app-toast.is-leaving{
            animation:toast-out .18s ease forwards;
        }

        @keyframes toast-in{
            from{
                opacity:0;
                transform:translateY(-8px) scale(.98);
            }
            to{
                opacity:1;
                transform:translateY(0) scale(1);
            }
        }

        @keyframes toast-out{
            from{
                opacity:1;
                transform:translateY(0) scale(1);
            }
            to{
                opacity:0;
                transform:translateY(-8px) scale(.98);
            }
        }

        @media (max-width: 768px) {
            .form-grid-2 {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 24px;
            }

            .auth-title {
                font-size: 28px;
            }

            .checkbox-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <div id="toast-stack" class="app-toast-stack" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <script>
    document.addEventListener("click", function (e) {
        const btn = e.target.closest("[data-toggle-password]");
        if (!btn) return;

        const targetId = btn.getAttribute("data-target");
        const input = document.getElementById(targetId);
        if (!input) return;

        const label = btn.querySelector("[data-toggle-label]");
        const eye = btn.querySelector("[data-eye]");
        const eyeOff = btn.querySelector("[data-eye-off]");

        input.type = input.type === "password" ? "text" : "password";

        if (input.type === "password") {
            if (label) label.textContent = "Ver";
            if (eye) eye.style.display = "inline-flex";
            if (eyeOff) eyeOff.style.display = "none";
        } else {
            if (label) label.textContent = "Ocultar";
            if (eye) eye.style.display = "none";
            if (eyeOff) eyeOff.style.display = "inline-flex";
        }
    });
    </script>

    <script>
    (function () {
        const stack = document.getElementById("toast-stack");
        if (!stack) return;

        function getToastMeta(level) {
            switch (level) {
                case "success":
                    return { title: "Sucesso", icon: "bi-check-circle" };
                case "error":
                    return { title: "Erro", icon: "bi-exclamation-circle" };
                case "warning":
                    return { title: "Aviso", icon: "bi-exclamation-triangle" };
                default:
                    return { title: "Informação", icon: "bi-info-circle" };
            }
        }

        function removeToast(toast) {
            if (!toast || toast.classList.contains("is-leaving")) return;
            toast.classList.add("is-leaving");
            setTimeout(() => toast.remove(), 180);
        }

        function showToast(level, message) {
            if (!message) return;

            const meta = getToastMeta(level || "info");
            const toast = document.createElement("div");
            toast.className = `app-toast app-toast--${level || "info"}`;

            toast.innerHTML = `
                <div class="app-toast__icon">
                    <i class="bi ${meta.icon}"></i>
                </div>
                <div class="app-toast__content">
                    <p class="app-toast__title">${meta.title}</p>
                    <p class="app-toast__message"></p>
                </div>
                <button type="button" class="app-toast__close" aria-label="Fechar">
                    <i class="bi bi-x-lg"></i>
                </button>
            `;

            toast.querySelector(".app-toast__message").textContent = message;
            toast.querySelector(".app-toast__close").addEventListener("click", () => removeToast(toast));

            stack.appendChild(toast);
            setTimeout(() => removeToast(toast), 4000);
        }

        document.body.addEventListener("app:toast", function (event) {
            const detail = event.detail && typeof event.detail === "object"
                ? (event.detail.value && typeof event.detail.value === "object" ? event.detail.value : event.detail)
                : {};

            showToast(detail.level || "info", detail.message || "");
        });

        {% if messages %}
            {% for message in messages %}
                showToast(
                    "{% if 'error' in message.tags %}error{% elif 'warning' in message.tags %}warning{% elif 'success' in message.tags %}success{% else %}info{% endif %}",
                    "{{ message|escapejs }}"
                );
            {% endfor %}
        {% endif %}
    })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
